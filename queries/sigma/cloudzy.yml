title: Network Connection to Anonymous VPS — Cloudzy
id: 4c8f8256-928a-5c2f-acae-8ea29a26f69d
status: experimental
description: Detects outbound network connections to IP ranges associated with anonymous VPS provider 'Cloudzy' (AS396998), which accepts cryptocurrency payments and requires no KYC.
references:
    - https://github.com/windshock/anonymous-vps
    - https://github.com/windshock/anonymous-vps/blob/main/data/vps-providers.csv
author: windshock
date: 2026-04-01
modified: 2026-04-01
tags:
    - attack.command_and_control
    - attack.t1090
    - attack.t1583.003
logsource:
    category: firewall
    product: any
detection:
    selection:
        dst_ip|cidr:
      - '104.152.140.0/24'
      - '172.111.34.0/24'
      - '205.220.224.0/23'
      - '205.220.228.0/24'
      - '205.220.230.0/23'
      - '206.71.159.0/24'
      - '209.237.140.0/24'
      - '23.183.240.0/21'
    condition: selection
falsepositives:
    - Legitimate use of VPS services by internal users
    - Cloud workloads intentionally communicating with these providers
fields:
    - dst_ip
    - src_ip
    - dst_port
    - proto
level: medium
