      - '128.204.197.0/24'
      - '128.204.199.0/24'
      - '128.204.205.0/24'
      - '185.62.56.0/22'
      - '193.33.60.0/23'
      - '193.34.166.0/23'
      - '195.20.204.0/23'
      - '37.148.160.0/22'
      - '37.148.165.0/24'
      - '5.104.224.0/23'
      - '5.104.226.0/24'
      - '5.104.228.0/24'
      - '77.95.224.0/21'
      - '78.41.200.0/21'
      - '89.207.128.0/22'
