title: Network Connection to Anonymous VPS — Snel.com
id: 7c8ca050-0522-5d6b-a4d4-b7fae8b4e46f
status: experimental
description: Detects outbound network connections to IP ranges associated with anonymous VPS provider 'Snel.com' (AS62370), which accepts cryptocurrency payments and requires no KYC.
