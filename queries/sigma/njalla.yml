title: Network Connection to Anonymous VPS — Njalla
id: 477a45cb-dac9-5eb0-97bc-22478cafead2
status: experimental
description: Detects outbound network connections to IP ranges associated with anonymous VPS provider 'Njalla' (AS39287), which accepts cryptocurrency payments and requires no KYC.
references:
    - https://github.com/windshock/anonymous-vps
    - https://github.com/windshock/anonymous-vps/blob/main/data/vps-providers.csv
author: windshock
date: 2026-04-01
modified: 2026-04-01
tags:
    - attack.command_and_control
    - attack.t1090
    - attack.t1583.003
logsource:
    category: firewall
    product: any
detection:
    selection:
        dst_ip|cidr:
      - '185.193.125.0/24'
      - '185.193.126.0/23'
      - '195.14.20.0/24'
      - '197.231.220.0/22'
      - '198.167.192.0/19'
      - '45.134.242.0/24'
      - '45.142.140.0/22'
      - '45.158.116.0/22'
      - '80.78.16.0/20'
      - '95.215.16.0/22'
    condition: selection
falsepositives:
    - Legitimate use of VPS services by internal users
    - Cloud workloads intentionally communicating with these providers
fields:
    - dst_ip
    - src_ip
    - dst_port
    - proto
level: medium
