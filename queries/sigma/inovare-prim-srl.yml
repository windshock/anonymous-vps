title: Network Connection to Anonymous VPS — Inovare-Prim SRL
id: 4fcfc865-b884-582c-8645-10e67aa773fa
status: experimental
description: Detects outbound network connections to IP ranges associated with anonymous VPS provider 'Inovare-Prim SRL' (AS60602), which accepts cryptocurrency payments and requires no KYC.
references:
    - https://github.com/windshock/anonymous-vps
    - https://github.com/windshock/anonymous-vps/blob/main/data/vps-providers.csv
author: windshock
date: 2026-04-06
modified: 2026-04-06
tags:
    - attack.command_and_control
    - attack.t1090
    - attack.t1583.003
logsource:
    category: firewall
    product: any
detection:
    selection:
        dst_ip|cidr:
      - '154.16.177.0/24'
      - '154.56.0.0/24'
      - '185.181.228.0/23'
      - '185.181.230.0/24'
      - '194.33.40.0/22'
      - '222.167.254.0/24'
      - '5.101.80.0/24'
      - '80.66.79.0/24'
      - '82.25.203.0/24'
    condition: selection
falsepositives:
    - Legitimate use of VPS services by internal users
    - Cloud workloads intentionally communicating with these providers
fields:
    - dst_ip
    - src_ip
    - dst_port
    - proto
level: medium
